<!DOCTYPE html>
<html>
<head>
    <title>Spin Game</title>
</head>

<body style="background:#0f172a; color:white; text-align:center; font-family:Arial;">

    <h1> Spin to Win- Salahybo </h1>

    <!-- Chances -->
    <div style="position:absolute; left:20px; top:100px; text-align:left;">
        <h3>Chances: </h3>
        <p>Common 🟩 - 75%</p>
        <p>Rare 🟦- 20%</p>
        <p>Epic 🟪- 3%</p>
        <p>Legendary 🟨- 1%</p>
        <p>Mythic 🟥️- 0.75%</p>
        <p>Secret ⬛- 0.2%</p>
        <p>God ⬜- 0.04%</p>
        <p>OG 🐘- 0.01%</p>
    </div>

    <h2 id="result">Try ur luck</h2>

    <button onclick="spin()" 
    style="padding:25px 60px; font-size:30px; background:#22c55e; border:none; border-radius:15px;">
         SPIN
    </button>

    <!-- Inventory -->
    <h2> Get an OG to win a free 200mil Tang Tang</h2>
    <p>Common: <span id="common">0</span></p>
    <p>Rare: <span id="rare">0</span></p>
    <p>Epic: <span id="epic">0</span></p>
    <p>Legendary: <span id="legendary">0</span></p>
    <p>Mythic: <span id="mythic">0</span></p>
    <p>Secret: <span id="secret">0</span></p>
    <p>God: <span id="god">0</span></p>
    <p>OG: <span id="og">0</span></p>

    <audio id="spinSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>

    <script>
        let inventory = {
            common: 0,
            rare: 0,
            epic: 0,
            legendary: 0,
            mythic: 0,
            secret: 0,
            god: 0,
            og: 0
        };

        function spin() {
            let rand = Math.random() * 100;
            let result = "";

            if (rand < 75) {
                result = "Common ";
                inventory.common++;
            } 
            else if (rand < 95) {
                result = "Rare ";
                inventory.rare++;
            } 
            else if (rand < 98) {
                result = "Epic ";
                inventory.epic++;
            } 
            else if (rand < 99) {
                result = "Legendary ";
                inventory.legendary++;
            } 
            else if (rand < 99.75) {
                result = "Mythic ";
                inventory.mythic++;
            } 
            else if (rand < 99.95) {
                result = "Secret ";
                inventory.secret++;
            } 
            else if (rand < 99.99) {
                result = "God ";
                inventory.god++;
            } 
            else {
                result = "OG ";
                inventory.og++;
            }

            document.getElementById("result").innerText = result;

            for (let key in inventory) {
                document.getElementById(key).innerText = inventory[key];
            }

            document.getElementById("spinSound").play();
        }
    </script>

</body>
</html>
